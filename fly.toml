# fly.toml app configuration file generated for fairnsquare-green-thunder-9750 on 2026-03-07T11:59:22+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fairnsquare'
primary_region = 'cdg'

[build]
  image = 'quay.io/skhoury/fairnsquare:latest'
#  dockerfile = 'docker/Dockerfile.jvm'

[[mounts]]
  source = 'fairnsquare_disk'
  destination = '/data:z'
  mode = 'rw'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
