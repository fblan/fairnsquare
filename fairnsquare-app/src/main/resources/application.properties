# FairNSquare Application Configuration

# Application Info
quarkus.application.name=fairnsquare
quarkus.application.version=1.0.0-SNAPSHOT

# HTTP Configuration
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# CORS - Allow frontend dev server
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173,http://localhost:8080

# Health Checks
quarkus.smallrye-health.root-path=/q/health

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.path=/q/openapi
quarkus.smallrye-openapi.info-title=FairNSquare API
quarkus.smallrye-openapi.info-version=${quarkus.application.version}
quarkus.smallrye-openapi.info-description=API for the FairNSquare expense splitting application
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# Quinoa - Frontend SPA Configuration
quarkus.quinoa.dev-server.port=5173
quarkus.quinoa.enable-spa-routing=true
quarkus.quinoa.build-dir=dist

# =============================================================================
# OpenTelemetry Configuration
# =============================================================================
quarkus.otel.service.name=fairnsquare
quarkus.otel.resource.attributes=service.version=${quarkus.application.version}

# Tracing - Default: export to OTLP endpoint (production use)
quarkus.otel.exporter.otlp.traces.endpoint=http://localhost:4317

# Metrics - Default: export to OTLP endpoint (production use)
# Note: Metrics collection is automatic; export requires OTLP collector
quarkus.otel.metrics.exporter=otlp
quarkus.otel.exporter.otlp.metrics.endpoint=http://localhost:4317

# =============================================================================
# Logging Configuration
# =============================================================================
# Default log format includes trace context for correlation
quarkus.log.console.format=%d{HH:mm:ss} %-5p traceId=%X{traceId}, spanId=%X{spanId} [%c{2.}] (%t) %s%e%n

# =============================================================================
# Dev Profile - Local development without OTLP collector
# =============================================================================
%dev.quarkus.otel.traces.exporter=none
%dev.quarkus.otel.metrics.exporter=none
%dev.quarkus.log.console.json.enabled=false
# Traces are still generated and visible in logs via MDC, but not exported

# =============================================================================
# Test Profile - Testing without OTLP collector
# =============================================================================
%test.quarkus.otel.traces.exporter=none
%test.quarkus.otel.metrics.exporter=none
%test.quarkus.log.console.json.enabled=true
%test.quarkus.log.console.json.pretty-print=false

# =============================================================================
# Prod Profile - Full observability with OTLP export
# =============================================================================
%prod.quarkus.log.console.json.enabled=true
%prod.quarkus.log.console.json.pretty-print=false
# In prod, traces and metrics are exported to OTLP endpoint (configured above)

# =============================================================================
# Application Configuration
# =============================================================================
# Data storage path (configurable via env var)
fairnsquare.data.path=${FAIRNSQUARE_DATA_PATH:data}